# =============================================================================
# specforge catalog-info.yaml
# -----------------------------------------------------------------------------
# TODO: Commit this file as `catalog-info.yaml` to the ROOT of the specforge repo
#       on the `main` branch:
#         https://github.com/KrishivGupta-07/bmad-jio-spec-workflow
#
# The Backstage portal points a catalog location at:
#   https://github.com/KrishivGupta-07/bmad-jio-spec-workflow/blob/main/catalog-info.yaml
# so once this is committed there, the specforge System + Components appear in
# the catalog with ownership resolved to user:default/krishiv (defined locally
# in this portal's catalog/org.yaml).
# =============================================================================
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: specforge
  description: >-
    BMAD-Method spec workflow platform (FastAPI + React + Langfuse + Docker
    Compose) that wraps BMAD-Method workflows.
  annotations:
    github.com/project-slug: KrishivGupta-07/bmad-jio-spec-workflow
spec:
  owner: user:default/krishiv
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: specforge-web
  description: >-
    FastAPI + React web backend that drives BMAD-Method spec workflows, backed
    by Langfuse for observability. Runs via Docker Compose.
  annotations:
    # project-slug powers GitHub-related catalog features (links, insights, etc.)
    github.com/project-slug: KrishivGupta-07/bmad-jio-spec-workflow
    # techdocs-ref: dir:. tells TechDocs to build docs from this repo's mkdocs.yml
    backstage.io/techdocs-ref: dir:.
spec:
  type: service
  lifecycle: experimental
  owner: user:default/krishiv
  system: specforge
  # Link the component to the API entity it exposes (shows up in the "APIs" tab).
  providesApis:
    - specforge-web-api
  # Relations that build out the system graph (see the entity's "Dependencies" /
  # relations and the System diagram).
  dependsOn:
    - component:specforge-module
    - resource:langfuse
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: specforge-web-api
  description: >-
    HTTP API exposed by specforge-web (FastAPI). Auto-generated OpenAPI spec.
  annotations:
    github.com/project-slug: KrishivGupta-07/bmad-jio-spec-workflow
spec:
  type: openapi
  lifecycle: experimental
  owner: user:default/krishiv
  system: specforge
  # $text loads the OpenAPI document committed next to this file (repo root).
  # TODO: regenerate openapi.json from FastAPI when the API changes, e.g.:
  #   curl -s http://localhost:8000/openapi.json -o openapi.json
  # Alternatively reference the live spec directly:
  #   definition:
  #     $text: http://localhost:8000/openapi.json   # only while specforge-web runs
  definition:
    $text: ./openapi.json
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: specforge-module
  description: >-
    Reusable library code / BMAD-Method workflow modules used by specforge-web.
  annotations:
    github.com/project-slug: KrishivGupta-07/bmad-jio-spec-workflow
    backstage.io/techdocs-ref: dir:.
spec:
  type: library
  lifecycle: experimental
  owner: user:default/krishiv
  system: specforge
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: langfuse
  description: >-
    Langfuse LLM observability backend for specforge (Docker Compose service,
    host port 3000).
spec:
  type: observability
  owner: user:default/krishiv
  system: specforge
  # Langfuse stores its data in a dedicated Postgres instance.
  dependsOn:
    - resource:langfuse-db
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: langfuse-db
  description: >-
    Postgres 16 database backing Langfuse (Docker Compose service, host port 5433).
spec:
  type: database
  owner: user:default/krishiv
  system: specforge
