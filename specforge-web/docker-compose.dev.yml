services:
  backend:
    volumes:
      - ./backend:/app
      - /app/.venv
      - ./workspace:/app/workspace
      - ../specforge-module:/app/specforge-module
      - specforge-sqlite-db:/app/db
      - ~/.claude:/root/.claude
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: npm run dev -- --host
