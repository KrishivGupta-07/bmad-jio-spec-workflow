services:
  postgres:
    image: postgres:16-alpine
    container_name: specforge-langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    ports:
      - "5433:5432"
    volumes:
      - langfuse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/public/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    container_name: specforge-langfuse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: specforge-local-dev-secret
      SALT: specforge-local-dev-salt
      LANGFUSE_INIT_ORG_ID: specforge-local
      LANGFUSE_INIT_ORG_NAME: Specforge Local
      LANGFUSE_INIT_PROJECT_ID: specforge-web
      LANGFUSE_INIT_PROJECT_NAME: specforge-web
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-local-dev
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-local-dev
      LANGFUSE_INIT_USER_EMAIL: admin@local.dev
      LANGFUSE_INIT_USER_PASSWORD: password
      LANGFUSE_INIT_USER_NAME: Admin

volumes:
  langfuse_pg_data:
