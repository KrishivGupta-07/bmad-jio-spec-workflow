services:
  postgres:
    image: postgres:16-alpine
    container_name: specforge-langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-langfuse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-langfuse}
      POSTGRES_DB: ${DB_NAME:-langfuse}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - langfuse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    container_name: specforge-langfuse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-langfuse}:${DB_PASSWORD:-langfuse}@postgres:5432/${DB_NAME:-langfuse}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-specforge-local-dev-secret}
      SALT: ${SALT:-specforge-local-dev-salt}
      HOSTNAME: 0.0.0.0
      LANGFUSE_INIT_ORG_ID: specforge-local
      LANGFUSE_INIT_ORG_NAME: Specforge Local
      LANGFUSE_INIT_PROJECT_ID: specforge-web
      LANGFUSE_INIT_PROJECT_NAME: specforge-web
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-local-dev}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-local-dev}
      LANGFUSE_INIT_USER_EMAIL: ${ADMIN_EMAIL:-admin@local.dev}
      LANGFUSE_INIT_USER_PASSWORD: ${ADMIN_PASSWORD:-password}
      LANGFUSE_INIT_USER_NAME: ${ADMIN_NAME:-Admin}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); http.get('http://localhost:3000/api/public/health', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: specforge-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      langfuse:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - SPECFORGE_MODULE_PATH=/app/specforge-module
      - WORKSPACE_ROOT=/app/workspace
      - DATABASE_URL=sqlite+aiosqlite:////app/db/specforge-web.db
      - CLAUDE_CLI_PATH=claude
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-pk-lf-local-dev}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-sk-lf-local-dev}
      - LANGFUSE_HOST=http://langfuse:3000
      - CORS_ORIGINS=http://localhost:${FRONTEND_PORT:-5173}
    volumes:
      - ./workspace:/app/workspace
      - ../specforge-module:/app/specforge-module
      - specforge-sqlite-db:/app/db
      - ~/.claude:/root/.claude

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: specforge-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  langfuse_pg_data:
  specforge-sqlite-db:
